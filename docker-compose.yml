# =============================================================
# Docker Compose — Sistema IoT de Riego Agrícola (MVP)
# =============================================================
# Servicios:
#   1. mysql     — Base de datos MySQL 8
#   2. backend   — FastAPI + Uvicorn (puerto 5050)
#   3. frontend  — React SPA (Nginx interno sirviendo build estático)
#
# Deployment:
#   - En Dokploy: define dominio/rutas desde la UI de Domains (sin labels).
#   - Local: Usa los ports mapeados en localhost.
#
# Uso local:
#   docker compose up -d --build
#   → Backend: http://localhost:5050
#   → Frontend: http://localhost:3022
#
# Uso en Dokploy:
#   Conectar repo → Dokploy lee este archivo y Traefik rutea automáticamente.
#   Cambiar "sensores.tudominio.com" por tu dominio real.
# =============================================================

services:
  # --- Base de Datos ---
  mysql:
    image: mysql:8.0
    container_name: sensores_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-sensores_riego}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT_BIND:-127.0.0.1:3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Backend (FastAPI) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sensores_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-rootpass}
      - DB_NAME=${DB_NAME:-sensores_riego}
      - FRONTEND_PUBLIC_URL=${FRONTEND_PUBLIC_URL:-http://localhost:3022}
      - PASSWORD_RESET_URL_BASE=${PASSWORD_RESET_URL_BASE:-http://localhost:3022/restablecer-contrasena}
      - SECRET_KEY=${SECRET_KEY:-dev-only-change-me-in-production-abc123xyz}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - DEBUG=${DEBUG:-false}
      - NOTIFICATIONS_ENABLED=${NOTIFICATIONS_ENABLED:-false}
      - NOTIFICATIONS_EMAIL_ENABLED=${NOTIFICATIONS_EMAIL_ENABLED:-false}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-false}
      - NOTIFICATION_EMAIL_SUBJECT_PREFIX=${NOTIFICATION_EMAIL_SUBJECT_PREFIX:-[Sensores IoT]}
      - NOTIFICATIONS_WHATSAPP_ENABLED=${NOTIFICATIONS_WHATSAPP_ENABLED:-false}
      - WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER:-meta}
      - WHATSAPP_MESSAGE_MODE=${WHATSAPP_MESSAGE_MODE:-text}
      - WHATSAPP_API_BASE_URL=${WHATSAPP_API_BASE_URL:-https://graph.facebook.com/v20.0}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID:-}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN:-}
      - WHATSAPP_HTTP_TIMEOUT_SECONDS=${WHATSAPP_HTTP_TIMEOUT_SECONDS:-15}
      - WHATSAPP_TEMPLATE_NAME=${WHATSAPP_TEMPLATE_NAME:-alerta_riego_critica_v1}
      - WHATSAPP_TEMPLATE_LANGUAGE_CODE=${WHATSAPP_TEMPLATE_LANGUAGE_CODE:-es_MX}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_WHATSAPP_FROM=${TWILIO_WHATSAPP_FROM:-}
      - TWILIO_MESSAGING_SERVICE_SID=${TWILIO_MESSAGING_SERVICE_SID:-}
      - TWILIO_CONTENT_SID=${TWILIO_CONTENT_SID:-}
      - TWILIO_STATUS_CALLBACK_URL=${TWILIO_STATUS_CALLBACK_URL:-}
      - TWILIO_API_BASE_URL=${TWILIO_API_BASE_URL:-https://api.twilio.com}
      - AI_REPORTS_ENABLED=${AI_REPORTS_ENABLED:-false}
      - AI_REPORTS_DEFAULT_NOTIFY=${AI_REPORTS_DEFAULT_NOTIFY:-true}
      - AI_ALERT_RECOMMENDATIONS_ENABLED=${AI_ALERT_RECOMMENDATIONS_ENABLED:-true}
      - AI_ALERT_RECOMMENDATIONS_MAX_RECENT_READINGS=${AI_ALERT_RECOMMENDATIONS_MAX_RECENT_READINGS:-48}
      - AI_ASSISTANT_ENABLED=${AI_ASSISTANT_ENABLED:-true}
      - AI_ASSISTANT_MAX_AREAS=${AI_ASSISTANT_MAX_AREAS:-25}
      - AI_ASSISTANT_MAX_ALERTS=${AI_ASSISTANT_MAX_ALERTS:-40}
      - AI_ASSISTANT_MAX_HISTORY_MESSAGES=${AI_ASSISTANT_MAX_HISTORY_MESSAGES:-8}
      - AI_ASSISTANT_RATE_LIMIT_WINDOW_MINUTES=${AI_ASSISTANT_RATE_LIMIT_WINDOW_MINUTES:-15}
      - AI_ASSISTANT_RATE_LIMIT_MAX_REQUESTS=${AI_ASSISTANT_RATE_LIMIT_MAX_REQUESTS:-20}
      - AZURE_OPENAI_ENABLED=${AZURE_OPENAI_ENABLED:-false}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-10-21}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-}
      - AZURE_OPENAI_TEMPERATURE=${AZURE_OPENAI_TEMPERATURE:-0.2}
      - AZURE_OPENAI_MAX_TOKENS=${AZURE_OPENAI_MAX_TOKENS:-900}
      - AZURE_OPENAI_TIMEOUT_SECONDS=${AZURE_OPENAI_TIMEOUT_SECONDS:-30}
    ports:
      - "${BACKEND_PORT_BIND:-127.0.0.1:5050}:5050"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
  # --- Inactivity Scheduler (calls /api/v1/alerts/scan-inactivity) ---
  inactivity_scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sensores_inactivity_scheduler
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - BACKEND_API_URL=http://backend:5050/api/v1
      - SCHEDULER_ADMIN_EMAIL=${SCHEDULER_ADMIN_EMAIL}
      - SCHEDULER_ADMIN_PASSWORD=${SCHEDULER_ADMIN_PASSWORD}
      - INACTIVITY_SCAN_INTERVAL_SECONDS=${INACTIVITY_SCAN_INTERVAL_SECONDS:-300}
      - INACTIVITY_SCAN_MINUTES=${INACTIVITY_SCAN_MINUTES:-20}
      - INACTIVITY_SCAN_HTTP_TIMEOUT_SECONDS=${INACTIVITY_SCAN_HTTP_TIMEOUT_SECONDS:-20}
    command: ["python", "-m", "app.jobs.inactivity_scheduler"]

  # --- Notification Scheduler (calls /api/v1/alerts/dispatch-notifications) ---
  notification_scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sensores_notification_scheduler
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - BACKEND_API_URL=http://backend:5050/api/v1
      - SCHEDULER_ADMIN_EMAIL=${SCHEDULER_ADMIN_EMAIL}
      - SCHEDULER_ADMIN_PASSWORD=${SCHEDULER_ADMIN_PASSWORD}
      - NOTIFICATION_DISPATCH_INTERVAL_SECONDS=${NOTIFICATION_DISPATCH_INTERVAL_SECONDS:-300}
      - NOTIFICATION_DISPATCH_LIMIT=${NOTIFICATION_DISPATCH_LIMIT:-200}
      - NOTIFICATION_DISPATCH_ONLY_UNREAD=${NOTIFICATION_DISPATCH_ONLY_UNREAD:-false}
      - NOTIFICATION_DISPATCH_HTTP_TIMEOUT_SECONDS=${NOTIFICATION_DISPATCH_HTTP_TIMEOUT_SECONDS:-20}
    command: ["python", "-m", "app.jobs.notification_scheduler"]

  # --- AI Reports Scheduler (calls /api/v1/ai-reports/generate) ---
  ai_report_scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sensores_ai_report_scheduler
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - BACKEND_API_URL=http://backend:5050/api/v1
      - SCHEDULER_ADMIN_EMAIL=${SCHEDULER_ADMIN_EMAIL}
      - SCHEDULER_ADMIN_PASSWORD=${SCHEDULER_ADMIN_PASSWORD}
      - AI_REPORTS_SCHEDULER_ENABLED=${AI_REPORTS_SCHEDULER_ENABLED:-false}
      - AI_REPORTS_DEFAULT_NOTIFY=${AI_REPORTS_DEFAULT_NOTIFY:-true}
      - AI_REPORTS_SCHEDULER_FORCE=${AI_REPORTS_SCHEDULER_FORCE:-false}
      - AI_REPORTS_SCHEDULER_POLL_SECONDS=${AI_REPORTS_SCHEDULER_POLL_SECONDS:-60}
      - AI_REPORTS_SCHEDULE_HOUR_UTC=${AI_REPORTS_SCHEDULE_HOUR_UTC:-2}
      - AI_REPORTS_SCHEDULE_MINUTE_UTC=${AI_REPORTS_SCHEDULE_MINUTE_UTC:-0}
      - AI_REPORTS_HTTP_TIMEOUT_SECONDS=${AI_REPORTS_HTTP_TIMEOUT_SECONDS:-30}
    command: ["python", "-m", "app.jobs.ai_report_scheduler"]

  # --- Frontend (React + Nginx interno para SPA) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sensores_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT_BIND:-127.0.0.1:3022}:80"
    healthcheck:
      test: ["CMD-SHELL", "test -f /usr/share/nginx/html/index.html"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      # Fallback routing for Dokploy/Traefik when Domains UI is not applying rules.
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.sensores-frontend-web.rule=Host(`${DOMAIN:-sensores.alanrz.bond}`)"
      - "traefik.http.routers.sensores-frontend-web.entrypoints=web"
      - "traefik.http.routers.sensores-frontend-web.service=sensores-frontend"
      - "traefik.http.routers.sensores-frontend-websecure.rule=Host(`${DOMAIN:-sensores.alanrz.bond}`)"
      - "traefik.http.routers.sensores-frontend-websecure.entrypoints=websecure"
      - "traefik.http.routers.sensores-frontend-websecure.tls=true"
      - "traefik.http.routers.sensores-frontend-websecure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.sensores-frontend-websecure.service=sensores-frontend"
      - "traefik.http.services.sensores-frontend.loadbalancer.server.port=80"
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=dokploy-network"
        - "traefik.http.routers.sensores-frontend-web.rule=Host(`${DOMAIN:-sensores.alanrz.bond}`)"
        - "traefik.http.routers.sensores-frontend-web.entrypoints=web"
        - "traefik.http.routers.sensores-frontend-web.service=sensores-frontend"
        - "traefik.http.routers.sensores-frontend-websecure.rule=Host(`${DOMAIN:-sensores.alanrz.bond}`)"
        - "traefik.http.routers.sensores-frontend-websecure.entrypoints=websecure"
        - "traefik.http.routers.sensores-frontend-websecure.tls=true"
        - "traefik.http.routers.sensores-frontend-websecure.tls.certresolver=letsencrypt"
        - "traefik.http.routers.sensores-frontend-websecure.service=sensores-frontend"
        - "traefik.http.services.sensores-frontend.loadbalancer.server.port=80"

volumes:
  mysql_data:
