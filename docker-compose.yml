# =============================================================
# Docker Compose — Sistema IoT de Riego Agrícola (MVP)
# =============================================================
# Servicios:
#   1. mysql     — Base de datos MySQL 8
#   2. backend   — FastAPI + Uvicorn (puerto 5050)
#   3. frontend  — React SPA (Nginx interno sirviendo build estático)
#
# Deployment:
#   - En Dokploy: Traefik maneja el ruteo público y SSL automático.
#     Las labels de Traefik están configuradas para rutear:
#       /api/*   → backend:5050
#       /*       → frontend:80
#   - Local: Usa los ports mapeados directamente.
#
# Uso local:
#   docker compose up -d --build
#   → Backend: http://localhost:5050
#   → Frontend: http://localhost:3000
#
# Uso en Dokploy:
#   Conectar repo → Dokploy lee este archivo y Traefik rutea automáticamente.
#   Cambiar "sensores.tudominio.com" por tu dominio real.
# =============================================================

services:
  # --- Base de Datos ---
  mysql:
    image: mysql:8.0
    container_name: sensores_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-sensores_riego}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Backend (FastAPI) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sensores_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-rootpass}
      - DB_NAME=${DB_NAME:-sensores_riego}
      - FRONTEND_PUBLIC_URL=${FRONTEND_PUBLIC_URL:-http://localhost:3000}
      - SECRET_KEY=${SECRET_KEY:-dev-only-change-me-in-production-abc123xyz}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - DEBUG=${DEBUG:-false}
      - NOTIFICATIONS_ENABLED=${NOTIFICATIONS_ENABLED:-false}
      - NOTIFICATIONS_EMAIL_ENABLED=${NOTIFICATIONS_EMAIL_ENABLED:-false}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-false}
      - NOTIFICATION_EMAIL_SUBJECT_PREFIX=${NOTIFICATION_EMAIL_SUBJECT_PREFIX:-[Sensores IoT]}
      - NOTIFICATIONS_WHATSAPP_ENABLED=${NOTIFICATIONS_WHATSAPP_ENABLED:-false}
      - WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER:-meta}
      - WHATSAPP_MESSAGE_MODE=${WHATSAPP_MESSAGE_MODE:-text}
      - WHATSAPP_API_BASE_URL=${WHATSAPP_API_BASE_URL:-https://graph.facebook.com/v20.0}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID:-}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN:-}
      - WHATSAPP_HTTP_TIMEOUT_SECONDS=${WHATSAPP_HTTP_TIMEOUT_SECONDS:-15}
      - WHATSAPP_TEMPLATE_NAME=${WHATSAPP_TEMPLATE_NAME:-alerta_riego_critica_v1}
      - WHATSAPP_TEMPLATE_LANGUAGE_CODE=${WHATSAPP_TEMPLATE_LANGUAGE_CODE:-es_MX}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_WHATSAPP_FROM=${TWILIO_WHATSAPP_FROM:-}
      - TWILIO_MESSAGING_SERVICE_SID=${TWILIO_MESSAGING_SERVICE_SID:-}
      - TWILIO_CONTENT_SID=${TWILIO_CONTENT_SID:-}
      - TWILIO_STATUS_CALLBACK_URL=${TWILIO_STATUS_CALLBACK_URL:-}
      - TWILIO_API_BASE_URL=${TWILIO_API_BASE_URL:-https://api.twilio.com}
    ports:
      - "5050:5050"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      # --- Traefik (Dokploy) ---
      - "traefik.enable=true"
      # Rutea /api/* y /health al backend
      - "traefik.http.routers.sensores-backend.rule=Host(`${DOMAIN:-sensores.tudominio.com}`) && (PathPrefix(`/api`) || PathPrefix(`/health`))"
      - "traefik.http.routers.sensores-backend.entrypoints=websecure"
      - "traefik.http.routers.sensores-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.sensores-backend.loadbalancer.server.port=5050"

  # --- Inactivity Scheduler (calls /api/v1/alerts/scan-inactivity) ---
  inactivity_scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sensores_inactivity_scheduler
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - BACKEND_API_URL=http://backend:5050/api/v1
      - SCHEDULER_ADMIN_EMAIL=${SCHEDULER_ADMIN_EMAIL}
      - SCHEDULER_ADMIN_PASSWORD=${SCHEDULER_ADMIN_PASSWORD}
      - INACTIVITY_SCAN_INTERVAL_SECONDS=${INACTIVITY_SCAN_INTERVAL_SECONDS:-300}
      - INACTIVITY_SCAN_MINUTES=${INACTIVITY_SCAN_MINUTES:-20}
      - INACTIVITY_SCAN_HTTP_TIMEOUT_SECONDS=${INACTIVITY_SCAN_HTTP_TIMEOUT_SECONDS:-20}
    command: ["python", "-m", "app.jobs.inactivity_scheduler"]

  # --- Notification Scheduler (calls /api/v1/alerts/dispatch-notifications) ---
  notification_scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sensores_notification_scheduler
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - BACKEND_API_URL=http://backend:5050/api/v1
      - SCHEDULER_ADMIN_EMAIL=${SCHEDULER_ADMIN_EMAIL}
      - SCHEDULER_ADMIN_PASSWORD=${SCHEDULER_ADMIN_PASSWORD}
      - NOTIFICATION_DISPATCH_INTERVAL_SECONDS=${NOTIFICATION_DISPATCH_INTERVAL_SECONDS:-300}
      - NOTIFICATION_DISPATCH_LIMIT=${NOTIFICATION_DISPATCH_LIMIT:-200}
      - NOTIFICATION_DISPATCH_ONLY_UNREAD=${NOTIFICATION_DISPATCH_ONLY_UNREAD:-false}
      - NOTIFICATION_DISPATCH_HTTP_TIMEOUT_SECONDS=${NOTIFICATION_DISPATCH_HTTP_TIMEOUT_SECONDS:-20}
    command: ["python", "-m", "app.jobs.notification_scheduler"]

  # --- Frontend (React + Nginx interno para SPA) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sensores_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    labels:
      # --- Traefik (Dokploy) ---
      - "traefik.enable=true"
      # Todo lo demás va al frontend
      - "traefik.http.routers.sensores-frontend.rule=Host(`${DOMAIN:-sensores.tudominio.com}`)"
      - "traefik.http.routers.sensores-frontend.entrypoints=websecure"
      - "traefik.http.routers.sensores-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.sensores-frontend.loadbalancer.server.port=80"
      # Prioridad más baja que el backend (Traefik usa la ruta más específica primero)
      - "traefik.http.routers.sensores-frontend.priority=1"

volumes:
  mysql_data:
