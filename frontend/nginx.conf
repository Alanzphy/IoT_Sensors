# Nginx config for the React SPA frontend container
# This handles SPA client-side routing (all paths → index.html)
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets directly with caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Local/Docker proxy for API calls. In Dokploy, Traefik usually handles /api
    # before the request reaches this container, but this keeps direct :3000
    # testing aligned with the production path shape.
    location /api/ {
        proxy_pass http://backend:5050/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: any route that doesn't match a real file → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable access to hidden files
    location ~ /\. {
        deny all;
    }
}
