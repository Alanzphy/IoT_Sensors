  /api/v1/auth/reset-password:
    post:
      tags:
      - Auth
      summary: Reset Password
      description: Reset password using a valid one-time recovery token.
      operationId: reset_password_api_v1_auth_reset_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetPasswordResponse'
        '400':
          description: Token invalido, expirado o ya utilizado
        '429':
          description: Demasiados intentos de restablecimiento desde la misma IP
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
