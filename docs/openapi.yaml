  # ─── READINGS ───────────────────────────────
  /api/v1/readings:
    post:
      tags: [Readings]
      summary: Ingesta de lectura de sensor
      description: |
        **Autenticación: API Key** (header `X-API-Key`).

        Endpoint usado por el simulador (Módulo de Control) para enviar datos cada 10 minutos.
        El backend valida la API Key, identifica el nodo, y guarda la lectura con sus 3 categorías
        en una transacción atómica (4 inserts: lecturas + suelo + riego + ambiental).

        Los campos de las 3 categorías pueden ser `null` si el sensor no reporta ese dato.
        Las categorías `soil`, `irrigation` y `environmental` siempre deben estar presentes.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReadingCreate'
      responses:
        '201':
          description: Lectura guardada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadingIngestionResponse'
        '400':
          description: Payload inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: API Key inválida o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Nodo deshabilitado o eliminado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Error de validación del payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

    get:
      tags: [Readings]
      summary: Histórico de lecturas
      description: |
        **Autenticación: JWT.**

        Retorna lecturas paginadas con los 12 campos (3 categorías) para un área de riego.
        Admin puede consultar cualquier área. Cliente solo sus áreas.

        Soporta filtros por rango de fechas o por ciclo de cultivo.
      security:
        - BearerAuth: []
      parameters:
        - name: irrigation_area_id
          in: query
          required: true
          schema:
            type: integer
          description: ID del área de riego (requerido)
        - $ref: '#/components/parameters/StartDateParam'
        - $ref: '#/components/parameters/EndDateParam'
        - name: crop_cycle_id
          in: query
          schema:
            type: integer
          description: Filtrar por ciclo de cultivo (alternativa a start_date/end_date)
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Lista de lecturas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadingListResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: No tiene acceso a esta área
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/readings/latest:
    get:
      tags: [Readings]
      summary: Última lectura (indicador de frescura)
      description: |
        **Autenticación: JWT.**

        Retorna la lectura más reciente de un área de riego.
        El frontend usa el `timestamp` para calcular el indicador de frescura
        ("Último dato: hace X minutos").
      security:
        - BearerAuth: []
      parameters:
        - name: irrigation_area_id
          in: query
          required: true
          schema:
            type: integer
          description: ID del área de riego
      responses:
        '200':
          description: Última lectura del área
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadingResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: No tiene acceso a esta área
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No hay lecturas para esta área
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/readings/export:
    get:
      tags: [Readings]
      summary: Exportar lecturas
      description: |
        **Autenticación: JWT.**

        Genera y descarga un archivo con las lecturas filtradas.
        Aplica los mismos filtros que el histórico pero sin paginación (todos los registros).
        Formatos: CSV, Excel (.xlsx) o PDF.
      security:
        - BearerAuth: []
      parameters:
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [csv, xlsx, pdf]
          description: Formato del archivo de exportación
        - name: irrigation_area_id
          in: query
          required: true
          schema:
            type: integer
          description: ID del área de riego
        - $ref: '#/components/parameters/StartDateParam'
        - $ref: '#/components/parameters/EndDateParam'
        - name: crop_cycle_id
          in: query
          schema:
            type: integer
          description: Filtrar por ciclo de cultivo
      responses:
        '200':
          description: Archivo para descarga
          headers:
            Content-Disposition:
              schema:
                type: string
              example: 'attachment; filename="readings_area1_2026-01-01_2026-01-31.csv"'
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: No tiene acceso a esta área
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Formato inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
